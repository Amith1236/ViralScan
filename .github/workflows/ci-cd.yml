name: ViralScan CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: viralscan
  REGISTRY: ghcr.io/${{ github.repository_owner }}


# Job 1: Tests

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-asyncio httpx

      # Inject dummy keys so Settings validation passes during tests
      - name: Run tests
        env:
          VIRUSTOTAL_API_KEY: test-key-not-real
          GEMINI_API_KEY: test-key-not-real
          ENVIRONMENT: test
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: backend/.pytest_cache/


# Job 2: Build & Push Docker image

  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write   

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


# Job 3: Deploy to EC2
# SSH into EC2, pull latest image, restart containers

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production  

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # Pull latest image
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            # Navigate to deployment directory
            cd ~/viralscan

            # Write fresh .env from GitHub Secrets (never stored in repo)
            cat > .env <<EOF
            ENVIRONMENT=production
            VIRUSTOTAL_API_KEY=${{ secrets.VIRUSTOTAL_API_KEY }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            CORS_ORIGINS=["https://${{ secrets.EC2_HOST }}"]
            EOF

            # Zero-downtime restart
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Health check
            sleep 10
            curl -f http://localhost/api/health || (echo "Health check failed!" && exit 1)

            # Prune old images
            docker image prune -f

      - name: Notify on failure
        if: failure()
        run: |
          echo "Deployment failed — check GitHub Actions logs and EC2 status"
          # Add Slack/email notification here if desired
