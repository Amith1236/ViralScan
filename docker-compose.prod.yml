version: "3.9"

services:
  # App (FastAPI) 
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: viralscan_app
    image: viralscan:latest
    env_file: .env
    environment:
      ENVIRONMENT: production
    expose:
      - "8000"          
    tmpfs:
      - /tmp/viralscan_uploads:mode=700,uid=1000  
    networks:
      - viralscan_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Nginx reverse proxy
  nginx:
    image: nginx:1.27-alpine
    container_name: viralscan_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro        
    depends_on:
      app:
        condition: service_healthy
    networks:
      - viralscan_net
    restart: unless-stopped

networks:
  viralscan_net:
    driver: bridge
    internal: false   
